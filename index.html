<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>柴舅 · AI伙伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #19233c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(10, 20, 35, 0.9);
            padding: 20px 24px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h1 {
            font-size: 1.7rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #e0e7ff, #b9c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 0.85rem;
            color: #9ab3d5;
            margin-top: 6px;
        }

        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeInUp 0.2s ease-out;
        }

        .user-message {
            align-self: flex-end;
        }

        .ai-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .user-message .bubble {
            background: #2c3e66;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .ai-message .bubble {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #eef3ff;
            border-bottom-left-radius: 6px;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px;
            background: rgba(10, 20, 35, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #5f7fbf;
            box-shadow: 0 0 0 2px rgba(95, 127, 191, 0.3);
        }

        .input-area input::placeholder {
            color: #8aa0c0;
        }

        .input-area button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .input-area button:hover {
            background: #3e5a8f;
        }

        .input-area button:active {
            transform: scale(0.96);
        }

        /* 加载动画 */
        .loading .bubble {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
        }

        .dot-floating {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .dot-floating span {
            width: 8px;
            height: 8px;
            background-color: #aac8ff;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.4s infinite ease-in-out both;
        }

        .dot-floating span:nth-child(1) { animation-delay: -0.32s; }
        .dot-floating span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes wave {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 滚动条样式 */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #1e2a3a;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #4a628a;
            border-radius: 10px;
        }

        /* 简单的响应式 */
        @media (max-width: 550px) {
            .message {
                max-width: 90%;
            }
            .input-area button {
                padding: 10px 18px;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>✨ 柴舅 · AI</h1>
        <p>柴舅吃饭中...</p>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message ai-message">
            <div class="bubble">
                嗨，我是柴舅AI ✨ 很高兴遇见你。<br>
                无论你想聊什么，我都愿意陪你一起探索～
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="说点什么吧..." autocomplete="off">
        <button id="sendBtn">发送 ✨</button>
    </div>
</div>

<script>
    // ============================================================
    // 🔗 重要：请将下面的 URL 替换成你自己的 Cloudflare Worker 地址
    // ============================================================
    const WORKER_API_URL = 'https://divine-frost-5df0.2995361547.workers.dev';  // ⚠️ 替换成你的真实 Worker 地址（末尾不要斜杠）

    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 对话历史数组（用于上下文记忆）
    let conversationHistory = [];

    // ---------- 辅助函数：显示消息 ----------
    function addMessage(content, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;
        
        messageDiv.appendChild(bubble);
        messagesArea.appendChild(messageDiv);
        
        // 自动滚动到底部
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // 显示“AI正在思考”动画
    let loadingMessageDiv = null;
    function showTyping() {
        if (loadingMessageDiv) return;
        loadingMessageDiv = document.createElement('div');
        loadingMessageDiv.className = 'message ai-message loading';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = `<div class="dot-floating"><span></span><span></span><span></span></div>`;
        loadingMessageDiv.appendChild(bubble);
        messagesArea.appendChild(loadingMessageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function hideTyping() {
        if (loadingMessageDiv) {
            loadingMessageDiv.remove();
            loadingMessageDiv = null;
        }
    }

    // ---------- 核心：发送消息 ----------
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        
        // 1. 显示用户消息
        addMessage(message, true);
        userInput.value = '';
        
        // 2. 将用户消息加入历史数组
        conversationHistory.push({ role: "user", content: message });
        
        // 3. 显示“正在输入”动画
        showTyping();
        
        try {
            // 4. 调用后端 Worker（带上当前消息和完整历史）
            const response = await fetch(WORKER_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,           // 当前消息
                    history: conversationHistory  // 全部历史（含刚才加的 user 消息）
                })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            hideTyping();
            
            if (data.reply) {
                // 5. 显示 AI 回复
                addMessage(data.reply, false);
                // 6. 把 AI 回复也存进历史（关键！上下文记忆）
                conversationHistory.push({ role: "assistant", content: data.reply });
            } else if (data.error) {
                addMessage(`✨ 柴舅有点恍惚…… ${data.error}`, false);
            } else {
                addMessage("✨ 柴舅暂时无法回应，请稍后再试吧～", false);
            }
        } catch (error) {
            console.error("请求 Worker 失败:", error);
            hideTyping();
            addMessage("✨ 柴舅已晕倒，稍后再试试看？", false);
        }
    }

    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
