<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>柴舅 · 你的AI伙伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0c1222 0%, #141e33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 16px;
        }

        .chat-card {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(18, 28, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            padding: 20px 24px;
            background: rgba(10, 18, 30, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e0e9ff, #a0c0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .chat-header p {
            font-size: 0.8rem;
            color: #8aa6d9;
            margin-top: 6px;
        }

        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeSlideUp 0.2s ease-out;
        }

        .user-message {
            align-self: flex-end;
        }

        .ai-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            line-height: 1.45;
            font-size: 0.95rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user-message .bubble {
            background: #2c3e66;
            color: white;
            border-bottom-right-radius: 6px;
            background: linear-gradient(135deg, #2c3e66, #3a5280);
        }

        .ai-message .bubble {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #eef3ff;
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(4px);
        }

        /* 思考动画 */
        .typing-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #aac8ff;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes wave {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 20px;
            background: rgba(10, 18, 30, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #5f7fbf;
            box-shadow: 0 0 0 2px rgba(95, 127, 191, 0.3);
        }

        .input-area input::placeholder {
            color: #8ba0c0;
        }

        .input-area button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-area button:hover {
            background: #3e5a8f;
            transform: scale(0.98);
        }

        .input-area button:active {
            transform: scale(0.96);
        }

        /* 滚动条 */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #1e2a3a;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #4a628a;
            border-radius: 10px;
        }

        /* 移动端适配 */
        @media (max-width: 550px) {
            .chat-card {
                height: 95vh;
                border-radius: 28px;
            }
            .message {
                max-width: 90%;
            }
            .input-area button {
                padding: 10px 20px;
            }
            .bubble {
                padding: 10px 14px;
            }
        }

        /* 清空会话按钮（小功能） */
        .reset-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #ccc;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            z-index: 10;
        }
        .reset-btn:hover {
            background: rgba(0,0,0,0.8);
            color: white;
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="chat-header">
        <h1>✨ 柴舅 · 最强的AI</h1>
        <p>薯片 · 果冻 · 编织AI对话</p>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message ai-message">
            <div class="bubble">
                嗨，我是柴舅 ✨<br>
                无论你想聊什么，先给我一根骨头～
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="说点什么吧..." autocomplete="off">
        <button id="sendBtn">
            <span>发送</span> ✨
        </button>
    </div>
</div>

<script>
    // ======================== 配置区域 ========================
    // ⚠️ 请填写你的 Worker 自定义域名（注意不要加末尾斜杠）
    const WORKER_API_URL = 'https://ai.zjn.indevs.in';

    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 对话历史（用于上下文记忆）
    let conversationHistory = [];

    // ======================== 辅助函数 ========================
    // 添加消息到界面
    function addMessage(content, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;
        messageDiv.appendChild(bubble);
        messagesArea.appendChild(messageDiv);
        // 自动滚动到底部
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // 显示 AI 思考中动画
    let typingDiv = null;
    function showTyping() {
        if (typingDiv) return;
        typingDiv = document.createElement('div');
        typingDiv.className = 'message ai-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        typingDiv.appendChild(bubble);
        messagesArea.appendChild(typingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    // 清空会话历史（可选功能）
    function resetConversation() {
        conversationHistory = [];
        // 清空消息区域，只保留欢迎语
        while (messagesArea.firstChild) {
            messagesArea.removeChild(messagesArea.firstChild);
        }
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message ai-message';
        welcomeDiv.innerHTML = `<div class="bubble">✨ 柴舅刚刚重启，记忆已清空。</div>`;
        messagesArea.appendChild(welcomeDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // ======================== 核心发送消息 ========================
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // 1. 显示用户消息
        addMessage(message, true);
        userInput.value = '';

        // 2. 将用户消息存入历史
        conversationHistory.push({ role: "user", content: message });

        // 3. 显示 AI 正在输入
        showTyping();

        try {
            // 4. 请求 Worker（带上完整历史）
            const response = await fetch(WORKER_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    history: conversationHistory
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            hideTyping();

            if (data.reply) {
                // 5. 显示 AI 回复
                addMessage(data.reply, false);
                // 6. 保存 AI 回复到历史（关键：实现连续对话）
                conversationHistory.push({ role: "assistant", content: data.reply });
            } else if (data.error) {
                addMessage(`✨ 柴舅走丢了：${data.error}`, false);
            } else {
                addMessage("✨ 柴舅未回应，请稍后再试～", false);
            }
        } catch (error) {
            console.error("请求 Worker 失败:", error);
            hideTyping();
            addMessage("✨ 柴舅无法连接柴柴能量，请检查网络或稍后再试。", false);
        }
    }

    // 绑定发送事件
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    // 可选：添加快捷重置功能（长按标题或加个小按钮）
    // 这里加一个优雅的轻触重置：在聊天区域右上角隐藏重置（长标题重置，但不影响体验）
    // 更简单：在控制台可调用 resetConversation()
    console.log("✅ 柴舅AI已就绪，会话历史将自动记忆。输入 /reset 清空记忆（可选）");

    // 额外彩蛋：如果用户发送 "/reset" ，重置会话
    const originalSend = sendMessage;
    window.sendMessage = sendMessage; // 保留
    // 拦截重置指令
    const superSend = async () => {
        const msg = userInput.value.trim();
        if (msg === '/reset') {
            userInput.value = '';
            resetConversation();
            return;
        }
        await sendMessage();
    };
    sendBtn.onclick = superSend;
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (msg === '/reset') {
                userInput.value = '';
                resetConversation();
                return;
            }
            sendMessage();
        }
    });
</script>
</body>
</html>
